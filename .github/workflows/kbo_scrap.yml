name: KBO daily scraping

on:
  schedule:
    # 한국 시간(KST) 오전 1시는 UTC 기준 전날 16시입니다.
    - cron: '0 16 * * *' 
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  scraping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # 리눅스용 바이너리 패키지로 광속 설치

      - name: Install Packages
        run: |
          Rscript -e 'install.packages(c("tidyverse", "jsonlite", "httr"))'

      - name: Run KBO Scraper
        # R 스크립트에서 데이터가 없으면 quit(status = 0)으로 종료하게 설계되었습니다.
        run: Rscript kbo_json_scraper.R

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 폴더 존재 여부와 그 안에 .json 파일이 있는지 확인
          if [ -d "kbo_raw_all" ] && ls kbo_raw_all/*.json 1> /dev/null 2>&1; then
            git add kbo_raw_all/*.json
            
            # 2. 스테이징된 변경사항(새로운 JSON)이 있는지 확인 후 커밋
            if ! git diff --cached --quiet; then
              git commit -m "Update KBO JSON: $(date +'%Y-%m-%d')"
              git push
            else
              echo "새로 수집된 데이터가 없어 커밋을 생략합니다."
            fi
          else
            echo "수집된 JSON 파일이 없습니다. (경기 없는 날 혹은 수집 실패)"
          fi
